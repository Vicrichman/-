<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f1117; color:#e0e0e0; font-family: -apple-system, 'Segoe UI', sans-serif; padding:20px; }
h1 { font-size:1.4em; margin-bottom:16px; color:#fff; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
.kpi-card { background:#1a1d2e; border-radius:10px; padding:16px; border:1px solid #2a2d3e; }
.kpi-card .label { font-size:0.75em; color:#888; margin-bottom:4px; }
.kpi-card .value { font-size:1.5em; font-weight:700; color:#fff; }
.kpi-card .sub { font-size:0.75em; color:#4ade80; margin-top:4px; }
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.chart-box { background:#1a1d2e; border-radius:10px; padding:16px; border:1px solid #2a2d3e; }
.chart-box.full { grid-column:1/-1; }
.chart-box h3 { font-size:0.9em; color:#aaa; margin-bottom:10px; }
canvas { width:100% !important; max-height:350px; }
.controls { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
.controls select, .controls input { background:#1a1d2e; color:#fff; border:1px solid #2a2d3e; border-radius:6px; padding:6px 12px; font-size:0.85em; }
.controls button { background:#3b82f6; color:#fff; border:none; border-radius:6px; padding:6px 16px; cursor:pointer; font-size:0.85em; }
.controls button:hover { background:#2563eb; }
.summary { background:#1a1d2e; border-radius:10px; padding:16px; border:1px solid #2a2d3e; margin-top:16px; }
.summary table { width:100%; border-collapse:collapse; font-size:0.82em; }
.summary th { text-align:left; color:#888; padding:6px 8px; border-bottom:1px solid #2a2d3e; }
.summary td { padding:6px 8px; border-bottom:1px solid #1f2235; }
.summary .hi { color:#4ade80; }
.summary .lo { color:#f87171; }
.summary .warn { color:#fbbf24; }
.summary tr:hover { background:#1f2235; }
</style>
</head>
<body>

<h1>📊 醒狮 · 得物推 每日投放效率看板</h1>

<div class="controls">
  <label style="color:#888;font-size:0.85em;">时间范围</label>
  <input type="date" id="dateFrom" value="2025-03-01">
  <span style="color:#888">~</span>
  <input type="date" id="dateTo" value="2026-05-08">
  <button onclick="filterData()">筛选</button>
  <button onclick="resetFilter()" style="background:#374151;">重置</button>
  <span style="color:#888;font-size:0.8em;margin-left:8px;" id="rangeInfo"></span>
</div>

<div class="kpi-grid" id="kpiCards"></div>

<div class="chart-grid">
  <div class="chart-box full"><h3>📈 每日消耗 & 直接成交金额（双轴）</h3><canvas id="chart1"></canvas></div>
  <div class="chart-box"><h3>🔄 每日 ROI 变化</h3><canvas id="chart2"></canvas></div>
  <div class="chart-box"><h3>👁 消耗 vs 全店UV 对比</h3><canvas id="chart3"></canvas></div>
  <div class="chart-box"><h3>📅 月度消耗 & ROI 柱状图</h3><canvas id="chart4"></canvas></div>
  <div class="chart-box"><h3>🎯 消耗 vs 直接订单 散点</h3><canvas id="chart5"></canvas></div>
</div>

<div class="summary"><h3 style="color:#aaa;font-size:0.9em;margin-bottom:8px;">📋 周汇总表</h3><div id="weekTable"></div></div>

let chart1, chart2, chart3, chart4, chart5;

// Parse dates
ALL_DATA.forEach(d => d._date = new Date(d.date));

function getFiltered() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (!from && !to) return ALL_DATA.filter(d => d.cost > 0);
  const fd = from ? new Date(from) : new Date('2020-01-01');
  const td = to ? new Date(to) : new Date('2030-01-01');
  td.setHours(23,59,59);
  return ALL_DATA.filter(d => d._date >= fd && d._date <= td);
}

function buildKPIs(data) {
  const totalCost = data.reduce((s,d)=>s+d.cost,0);
  const totalDirect = data.reduce((s,d)=>s+d.direct_amount,0);
  const totalOrders = data.reduce((s,d)=>s+d.direct_orders,0);
  const totalGuided = data.reduce((s,d)=>s+d.guided_amount,0);
  const avgROI = totalCost > 0 ? (totalDirect/totalCost).toFixed(2) : '0';
  const pushDays = data.filter(d=>d.cost>0).length;
  const cpe = totalOrders > 0 ? (totalCost/totalOrders).toFixed(0) : '∞';
  
  document.getElementById('kpiCards').innerHTML = `
    <div class="kpi-card"><div class="label">总消耗</div><div class="value">¥${totalCost.toLocaleString()}</div><div class="sub">${pushDays} 天有投放</div></div>
    <div class="kpi-card"><div class="label">直接成交 GMV</div><div class="value">¥${totalDirect.toLocaleString()}</div><div class="sub">直接ROI ${avgROI}</div></div>
    <div class="kpi-card"><div class="label">直接订单数</div><div class="value">${totalOrders}</div><div class="sub">单均成本 ¥${cpe}</div></div>
    <div class="kpi-card"><div class="label">引导成交 GMV</div><div class="value">¥${totalGuided.toLocaleString()}</div><div class="sub">含后续转化</div></div>
    <div class="kpi-card"><div class="label">总支付 GMV (全店)</div><div class="value">¥${data.reduce((s,d)=>s+d.total_pay_amount,0).toLocaleString()}</div><div class="sub">自然+投放</div></div>
  `;
  
  document.getElementById('rangeInfo').textContent = `${data.length}天 · ${data[0]?.date} ~ ${data[data.length-1]?.date}`;
}

function buildChart1(data) {
  const days = data.filter(d => d.cost > 0);
  if (chart1) chart1.destroy();
  const ctx = document.getElementById('chart1').getContext('2d');
  chart1 = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: days.map(d => d.date.slice(5)),
      datasets: [
        { label: '消耗 (¥)', data: days.map(d => d.cost), backgroundColor: '#3b82f680', borderColor: '#3b82f6', yAxisID: 'y', order: 2 },
        { label: '直接成交 (¥)', data: days.map(d => d.direct_amount), type: 'line', borderColor: '#4ade80', backgroundColor: '#4ade8020', fill: true, yAxisID: 'y1', tension: 0.2, order: 1 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#aaa' } } },
      scales: {
        x: { ticks: { color: '#666', maxTicksLimit: 30, maxRotation: 0 } },
        y: { type: 'linear', position: 'left', title: { display: true, text: '消耗 (¥)', color: '#3b82f6' }, ticks: { color: '#3b82f6' }, grid: { color: '#1f2235' } },
        y1: { type: 'linear', position: 'right', title: { display: true, text: '成交 (¥)', color: '#4ade80' }, ticks: { color: '#4ade80' }, grid: { display: false } }
      }
    }
  });
}

  const days = data.filter(d => d.cost > 0);
  if (chart2) chart2.destroy();
  const ctx = document.getElementById('chart2').getContext('2d');
  chart2 = new Chart(ctx, {
    type: 'line',
    data: {
      labels: days.map(d => d.date.slice(5)),
      datasets: [{
        label: '直接ROI', data: days.map(d => d.roi),
        borderColor: '#f59e0b', backgroundColor: '#f59e0b20', fill: true,
        tension: 0.3, pointRadius: days.map(d => d.cost > 500 ? 4 : 2)
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#aaa' } } },
      scales: {
        x: { ticks: { color: '#666', maxTicksLimit: 20 } },
        y: { ticks: { color: '#f59e0b' }, grid: { color: '#1f2235' } }
      }
    }
  });
}

function buildChart3(data) {
  const days = data.filter(d => d.cost > 0);
  if (chart3) chart3.destroy();

  chart3 = new Chart(ctx, {
    type: 'bar',

      labels: days.map(d => d.date.slice(5)),

        y1: { position: 'right', title: { display: true, text: 'UV/100', color: '#a78bfa' }, ticks: { color: '#a78bfa' }, grid: { display: false } }

function buildChart4(data) {
  // Aggregate by month
  const monthly = {};
  data.forEach(d => {
    const m = d.date.slice(0,7);
    if (!monthly[m]) monthly[m] = {cost:0, direct:0, guided:0, orders:0, days:0};
    monthly[m].cost += d.cost;
    monthly[m].direct += d.direct_amount;
    monthly[m].guided += d.guided_amount;
    monthly[m].orders += d.direct_orders;
    monthly[m].days++;
  });
  const months = Object.keys(monthly).sort();
  
  if (chart4) chart4.destroy();
  const ctx = document.getElementById('chart4').getContext('2d');
  chart4 = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: '消耗 (¥)', data: months.map(m => monthly[m].cost), backgroundColor: '#3b82f680', yAxisID: 'y' },
        { label: '直接ROI', data: months.map(m => monthly[m].cost>0?(monthly[m].direct/monthly[m].cost).toFixed(2):0), type: 'line', borderColor: '#f59e0b', yAxisID: 'y1', tension: 0.3 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#aaa' } } },
      scales: {
        x: { ticks: { color: '#666' } },
        y: { position: 'left', title: { display: true, text: '消耗 (¥)', color: '#3b82f6' }, ticks: { color: '#3b82f6' }, grid: { color: '#1f2235' } },
        y1: { position: 'right', title: { display: true, text: 'ROI', color: '#f59e0b' }, ticks: { color: '#f59e0b' }, min: 0, grid: { display: false } }
      }
    }
  });
}

function buildChart5(data) {
  const days = data.filter(d => d.cost > 0);
  if (chart5) chart5.destroy();
  const ctx = document.getElementById('chart5').getContext('2d');
  chart5 = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [{
        label: '每日投放',
        data: days.map(d => ({x: d.cost, y: d.direct_orders})),

    },

      plugins: {

          callbacks: {

          }
        }
      },

        x: { title: { display: true, text: '消耗 (¥)', color: '#3b82f6' }, ticks: { color: '#666' }, grid: { color: '#1f2235' } },
        y: { title: { display: true, text: '直接订单数', color: '#4ade80' }, ticks: { color: '#666' }, grid: { color: '#1f2235' } }
      }
    }

}

function buildWeekTable(data) {
  // Aggregate by ISO week
  const weeks = {};
  data.forEach(d => {
    const dt = d._date;
    const day = dt.getDay();
    const monday = new Date(dt);
    monday.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
    const wk = monday.toISOString().slice(0,10);
    if (!weeks[wk]) weeks[wk] = {cost:0, direct:0, guided:0, orders:0, uv:0, days:0, pushDays:0};
    weeks[wk].cost += d.cost;
    weeks[wk].direct += d.direct_amount;
    weeks[wk].guided += d.guided_amount;
    weeks[wk].orders += d.direct_orders;
    weeks[wk].uv += d.total_uv;
    weeks[wk].days++;
    if (d.cost > 0) weeks[wk].pushDays++;
  });
  
  const keys = Object.keys(weeks).sort().slice(-26); // last 6 months
  
  let html = '<table><thead><tr><th>周起始</th><th>消耗</th><th>直接订单</th><th>直接GMV</th><th>引导GMV</th><th>ROI</th><th>单均成本</th><th>投放日</th></tr></thead><tbody>';
  
  keys.forEach(wk => {
    const w = weeks[wk];
    const roi = w.cost > 0 ? w.direct / w.cost : 0;
    const cpe = w.orders > 0 ? w.cost / w.orders : 0;
    const roiClass = roi > 3 ? 'hi' : roi > 1.5 ? 'warn' : 'lo';
    html += `<tr>
      <td>${wk}</td>
      <td>¥${w.cost.toLocaleString()}</td>
      <td>${w.orders}</td>
      <td>¥${w.direct.toLocaleString()}</td>
      <td>¥${w.guided.toLocaleString()}</td>
      <td class="${roiClass}">${roi.toFixed(2)}</td>
      <td>¥${cpe.toFixed(0)}</td>
      <td>${w.pushDays}/${w.days}</td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  document.getElementById('weekTable').innerHTML = html;
}

function renderAll() {
  const data = getFiltered();
  buildKPIs(data);
  buildChart1(data);
  buildChart2(data);
  buildChart3(data);
  buildChart4(data);
  buildChart5(data);
  buildWeekTable(data);
}

function filterData() { renderAll(); }
function resetFilter() {
  document.getElementById('dateFrom').value = '2025-03-01';
  document.getElementById('dateTo').value = '2026-05-08';
  renderAll();
}

// Init
renderAll();
</script>
