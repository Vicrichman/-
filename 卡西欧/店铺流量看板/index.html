const fmtMoney = n => '¥'+(n/10000).toFixed(1)+'万';

let currentMonthIdx = [0, MONTHS.length-1];

function getMonthIdx(m) { return MONTHS.indexOf(m); }

function filterData(fromM, toM) {
  const fi = fromM ? getMonthIdx(fromM) : 0;
  const ti = toM ? getMonthIdx(toM) : MONTHS.length-1;
  currentMonthIdx = [Math.max(0,fi), Math.min(MONTHS.length-1,ti)];
  
  // Aggregate each SPU in range
  const spus = [];
  for (const [spuid, d] of Object.entries(SPUS)) {
    let gmv=0, orders=0, uv=0;
    for (let i=currentMonthIdx[0]; i<=currentMonthIdx[1]; i++) {
      gmv += d.g[i] || 0;
      orders += d.o[i] || 0;
      uv += d.u[i] || 0;
    }
    if (gmv>0 || orders>0 || uv>0) {
      spus.push({spuid, name:d.n, gmv, orders, uv});
    }
  }
  
  const topUv = [...spus].sort((a,b)=>b.uv-a.uv).slice(0,15);
  const topOrders = [...spus].sort((a,b)=>b.orders-a.orders).slice(0,15);
  const topGmv = [...spus].sort((a,b)=>b.gmv-a.gmv).slice(0,15);
  
  return {
    totalGmv: spus.reduce((s,d)=>s+d.gmv,0),
    totalOrders: spus.reduce((s,d)=>s+d.orders,0),
    totalUv: spus.reduce((s,d)=>s+d.uv,0),
    totalSpus: spus.length,
    topUv, topOrders, topGmv,
    monthlyGmv: MONTHS.slice(currentMonthIdx[0], currentMonthIdx[1]+1).map((m,i) => {
      const mi = currentMonthIdx[0]+i;
      let g=0, o=0;
      for (const [,d] of Object.entries(SPUS)) { g+=d.g[mi]||0; o+=d.o[mi]||0; }
      return {month:m, gmv:g, orders:o};
    }),
  };
}

  data.forEach((d,i)=>{
    h += '<tr><td><span class="'+rkClass(i+1)+'">'+(i+1)+'</span></td>';
    h += '<td><span class="sid">'+d.spuid+'</span></td>';
    h += '<td><span class="nm" title="'+d.name+'">'+d.name+'</span></td>';
    h += '<td class="nr">'+fmtFn(d[valueKey])+'</td></tr>';
  });
  return h+'</tbody>';
}

function render(r) {
  document.getElementById('loading').style.display='none';
  
  let html = '';
  
  // KPI
  html += '<div class="kpi-row">';
  html += '<div class="kpi-card"><div class="lb">总 GMV</div><div class="vl">'+fmtMoney(r.totalGmv)+'</div></div>';
  html += '<div class="kpi-card"><div class="lb">总订单量</div><div class="vl">'+fmt(r.totalOrders)+'<span class="un">单</span></div></div>';
  html += '<div class="kpi-card"><div class="lb">总 UV</div><div class="vl">'+fmt(r.totalUv)+'<span class="un">UV</span></div></div>';
  html += '<div class="kpi-card"><div class="lb">活跃 SPU</div><div class="vl">'+r.totalSpus+'<span class="un">个</span></div></div>';
  html += '</div>';
  
  // Charts
  html += '<div class="chart-row">';
  html += '<div class="chart-card"><h3>📈 GMV 月度趋势</h3><div class="wrap"><canvas id="chartGmv"></canvas></div></div>';
  html += '<div class="chart-card"><h3>📊 订单量月度趋势</h3><div class="wrap"><canvas id="chartOrders"></canvas></div></div>';
  html += '</div>';
  
  // Triple tables
  html += '<div class="triple-table">';
  html += '<div class="tbl-block"><h3><span class="badge badge-fire">流量</span>TOP15 UV</h3><table id="tblUv">'+buildTable(r.topUv,'uv',fmt)+'</table></div>';
  html += '<div class="tbl-block"><h3><span class="badge badge-order">销量</span>TOP15 订单量</h3><table id="tblOrders">'+buildTable(r.topOrders,'orders',fmt)+'</table></div>';
  html += '<div class="tbl-block"><h3><span class="badge badge-gmv">GMV</span>TOP15 GMV</h3><table id="tblGmv">'+buildTable(r.topGmv,'gmv',fmtMoney)+'</table></div>';
  html += '</div>';
  
  // Anomaly
  html += '<div class="anomaly"><h3>销量异动监控</h3><div class="ano-row">';
  html += '<div class="ano-item"><div class="ano-name">GA-2100-1A改装-冰刃月白</div><div class="ano-spuid">SPUID: 12798497</div><div class="ano-stat">⚠ 异动商品</div><div class="ano-detail">近期数据波动异常，建议关注</div></div>';
  html += '</div></div>';
  
  document.getElementById('app').innerHTML = html;
  
  // Charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  
  const months = r.monthlyGmv.map(d=>d.month);
  const co = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#8b92a8',maxTicksLimit:12,maxRotation:45},grid:{color:'#1e2335'}},y:{ticks:{color:'#8b92a8'},grid:{color:'#1e2335'}}}
  };
  
  const gmvVals = r.monthlyGmv.map(d=>d.gmv);
  const maxGmv = Math.max(...gmvVals, 1);
  charts.gmv = new Chart(document.getElementById('chartGmv'),{
    type:'bar',
    data:{labels:months,datasets:[{data:gmvVals,backgroundColor:gmvVals.map(v=>'rgba(108,123,255,'+(0.3+(v/maxGmv)*0.7)+')'),borderRadius:4}]},
    options:{...co,plugins:{tooltip:{callbacks:{label:ctx=>'GMV: ¥'+fmt(ctx.raw)}}},scales:{...co.scales,y:{...co.scales.y,ticks:{...co.scales.y.ticks,callback:v=>'¥'+(v/10000).toFixed(0)+'万'}}}}
  });
  
  charts.orders = new Chart(document.getElementById('chartOrders'),{
    type:'line',
    data:{labels:months,datasets:[{data:r.monthlyGmv.map(d=>d.orders),borderColor:'#6c7bff',backgroundColor:'rgba(108,123,255,0.1)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#6c7bff'}]},
    options:{...co,plugins:{tooltip:{callbacks:{label:ctx=>'订单: '+fmt(ctx.raw)+' 单'}}}}
  });
}

function applyFilter() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  render(filterData(from, to));
}
function resetFilter() {
  document.getElementById('dateFrom').value = ''; document.getElementById('dateFrom')._flatpickr.clear();
  document.getElementById('dateTo').value = ''; document.getElementById('dateTo')._flatpickr.clear();
  render(filterData(null, null));
}

// Init
flatpickr("#dateFrom",{locale:"zh",dateFormat:"Y-m",minDate:"2024-03",maxDate:"2026-01"});
flatpickr("#dateTo",{locale:"zh",dateFormat:"Y-m",minDate:"2024-03",maxDate:"2026-01"});

render(filterData(null, null));
</script>
